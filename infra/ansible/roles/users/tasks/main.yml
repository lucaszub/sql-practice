---
- name: Create deploy user
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: docker
    append: true
    create_home: true

- name: Remove NOPASSWD:ALL sudo if present
  file:
    path: "/etc/sudoers.d/{{ deploy_user }}"
    state: absent

- name: Create .ssh directory for deploy user
  file:
    path: "/home/{{ deploy_user }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: Copy root authorized_keys to deploy user
  copy:
    src: /root/.ssh/authorized_keys
    dest: "/home/{{ deploy_user }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  ignore_errors: true
