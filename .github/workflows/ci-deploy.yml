name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Trigger deploy webhook
        run: |
          STATUS=$(curl -s -o /tmp/deploy.log -w "%{http_code}" \
            -X POST "https://datapratice.lzubdev.com/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            --max-time 300)
          cat /tmp/deploy.log
          if [ "$STATUS" != "200" ]; then
            echo "Deploy failed with HTTP $STATUS"
            exit 1
          fi
