---
- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Deploy fail2ban jail config
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Enable and start fail2ban
  service:
    name: fail2ban
    enabled: true
    state: started

  handlers:
    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted
